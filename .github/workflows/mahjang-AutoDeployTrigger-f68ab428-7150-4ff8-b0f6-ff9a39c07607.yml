name: Trigger auto deployment for mahjang

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/mahjang-AutoDeployTrigger-f68ab428-7150-4ff8-b0f6-ff9a39c07607.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MAHJANG_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MAHJANG_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MAHJANG_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.MAHJANG_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MAHJANG_REGISTRY_PASSWORD }}
          containerAppName: mahjang
          resourceGroup: MahJangLTS
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


